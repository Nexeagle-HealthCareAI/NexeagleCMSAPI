# ============================================
#   Build & Deploy CMS API (.NET 8) — DEV ONLY
# ============================================

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

# ========================
# VARIABLES
# ========================
variables:
  apiProject: 'CMSAPI/CMSAPI.csproj'
  publishDir: '$(Build.ArtifactStagingDirectory)/publish'
  artifactName: 'api-drop'

  # DEV App Service
  devAppName: 'cms-api-dev'
  devServiceConnection: 'nexeagle-dev-intra'

# ========================
# STAGE 1 — BUILD
# ========================
stages:
- stage: Build
  displayName: Build & Package CMS API

  jobs:
  - job: BuildJob

    steps:

    - checkout: self

    - task: UseDotNet@2
      displayName: 'Use .NET 8 SDK'
      inputs:
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: restore
        projects: $(apiProject)

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: build
        projects: $(apiProject)
        arguments: '--configuration Release --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publish (ZIP)'
      inputs:
        command: publish
        projects: $(apiProject)
        arguments: '--configuration Release --no-build --no-restore --output $(publishDir)'
        publishWebProjects: false
        zipAfterPublish: true

    - publish: $(publishDir)
      artifact: $(artifactName)

# ========================
# STAGE 2 — DEPLOY DEV
# ========================
- stage: Deploy_Dev
  displayName: Deploy to Azure App Service (DEV)

  dependsOn: Build

  condition: succeeded()

  jobs:
  - deployment: DeployDev

    environment: 'dev'

    strategy:
      runOnce:
        deploy:

          steps:

          - download: current
            artifact: $(artifactName)

          - task: AzureWebApp@1
            displayName: 'Deploy ZIP to Azure App Service'

            inputs:
              azureSubscription: $(devServiceConnection)

              appType: webApp   # Windows App Service

              appName: $(devAppName)

              package: '$(Pipeline.Workspace)/$(artifactName)/**/*.zip'
