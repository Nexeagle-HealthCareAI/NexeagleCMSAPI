trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  dotnetVersion: "8.0.x"

  # Azure target
  azureServiceConnection: "nexeagleintra-dev"
  webAppName: "cms-api-dev"

steps:
  - checkout: self

  - task: UseDotNet@2
    displayName: "Install .NET SDK"
    inputs:
      packageType: "sdk"
      version: "$(dotnetVersion)"

  - script: |
      dotnet restore
    displayName: "Restore"

  - script: |
      dotnet build --configuration $(buildConfiguration) --no-restore
    displayName: "Build"

  # Update the path below to your actual CMS API .csproj
  # Example: src/CMSAPI/CMSAPI.csproj
  - script: |
      dotnet publish ./CMSAPI/CMSAPI.csproj -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/publish
    displayName: "Publish"

  - task: ArchiveFiles@2
    displayName: "Zip publish output"
    inputs:
      rootFolderOrFile: "$(Build.ArtifactStagingDirectory)/publish"
      includeRootFolder: false
      archiveType: "zip"
      archiveFile: "$(Build.ArtifactStagingDirectory)/cmsapi.zip"
      replaceExistingArchive: true

  - task: AzureWebApp@1
    displayName: "Deploy to Azure App Service (cms-api-dev)"
    inputs:
      azureSubscription: "$(azureServiceConnection)"
      appType: "webApp"
      appName: "$(webAppName)"
      package: "$(Build.ArtifactStagingDirectory)/cmsapi.zip"
