trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Azure Configuration
  azureServiceConnection: 'nexeagle-dev-intra'
  webAppName: 'cms-api-dev'
  
  # Build Configuration
  buildConfiguration: 'Release'
  dotnetVersion: '8.x'
  
  # Project Paths
  solutionPath: 'CMSAPI.sln'
  apiProjectPath: 'CMSAPI/CMSAPI.csproj'
  
  # Output paths
  publishDir: '$(Build.ArtifactStagingDirectory)/publish'
  zipPath: '$(Build.ArtifactStagingDirectory)/cmsapi.zip'

stages:

# =========================
# BUILD STAGE
# =========================
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Build and Publish'
    steps:

    - checkout: self

    # Install .NET 8 SDK
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetVersion)'

    - script: dotnet --info
      displayName: 'Show .NET Info'

    # Restore
    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet Packages'
      inputs:
        command: 'restore'
        projects: '$(solutionPath)'

    # Build
    - task: DotNetCoreCLI@2
      displayName: 'Build Solution'
      inputs:
        command: 'build'
        projects: '$(solutionPath)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    # Run tests (optional but recommended)
    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests'
      inputs:
        command: 'test'
        projects: '**/*Tests/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-build --no-restore'
        publishTestResults: true
      continueOnError: false

    # Publish API (CRITICAL FIX INCLUDED)
    - task: DotNetCoreCLI@2
      displayName: 'Publish API Project'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '$(apiProjectPath)'
        arguments: '--configuration $(buildConfiguration) --output $(publishDir) --no-build --no-restore'
        zipAfterPublish: false
        modifyOutputPath: false

    # Archive published files (CRITICAL: includeRootFolder=false)
    - task: ArchiveFiles@2
      displayName: 'Create Deployment ZIP'
      inputs:
        rootFolderOrFile: '$(publishDir)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(zipPath)'
        replaceExistingArchive: true

    # Publish artifact
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact'
      inputs:
        PathtoPublish: '$(zipPath)'
        ArtifactName: 'drop'
        publishLocation: 'Container'


# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: succeeded()

  jobs:
  - deployment: DeployWeb
    displayName: 'Deploy to Azure App Service'
    environment: 'development'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          # Deploy to Azure App Service
          - task: AzureWebApp@1
            displayName: 'Deploy to Azure App Service'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webApp'
              appName: '$(webAppName)'
              package:
